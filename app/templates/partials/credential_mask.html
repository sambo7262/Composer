<div class="space-y-3">
  <div class="flex items-center gap-2 mb-4">
    <span class="inline-block w-2 h-2 rounded-full bg-success"></span>
    <span class="text-success text-[15px] font-semibold">Connected and configured</span>
  </div>

  <div class="text-[15px]">
    <span class="text-text-secondary">URL:</span>
    <span class="text-text-primary">{{ setting.url }}</span>
  </div>

  {% if setting.credential_set %}
  <div class="text-[15px]">
    <span class="text-text-secondary">Credential:</span>
    <span class="text-text-muted">********</span>
  </div>
  {% endif %}

  {% if setting.extra_config %}
    {% for key, value in setting.extra_config.items() %}
    <div class="text-[15px]">
      <span class="text-text-secondary">{{ key | replace("_", " ") | title }}:</span>
      <span class="text-text-primary">{{ value }}</span>
    </div>
    {% endfor %}
  {% endif %}

  <div class="mt-4">
    <button hx-post="/api/settings/{{ service }}/reconfigure"
            hx-target="#{{ service }}-card"
            hx-swap="outerHTML"
            hx-confirm="Reconfiguring will clear your saved credentials for this service. Continue?"
            class="text-text-secondary hover:text-text-primary text-[15px] underline cursor-pointer bg-transparent border-0 p-0">
      Reconfigure
    </button>
  </div>
</div>
