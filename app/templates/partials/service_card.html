<div id="{{ service }}-card"
     class="bg-surface-card border border-border rounded-lg p-8 {% if configured %}border-l-4 border-l-success{% endif %}">
  <h2 class="text-[22px] font-semibold mb-1">{{ heading }}</h2>
  <p class="text-text-secondary text-[15px] mb-6">{{ description }}</p>

  {% if not enabled %}
    <div class="opacity-50 cursor-not-allowed">
      <p class="text-text-muted text-[15px]">Connect your Plex server first to enable other services.</p>
    </div>
  {% elif configured and setting %}
    {% include "partials/credential_mask.html" %}
  {% else %}
    {% include "partials/" ~ service ~ "_form.html" %}
  {% endif %}
</div>
