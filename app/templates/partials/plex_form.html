<form hx-post="/api/settings/plex/test" hx-target="#plex-result" hx-indicator="#plex-spinner">
  <div class="space-y-4">
    <div>
      <label for="plex-url" class="block text-[13px] text-text-secondary mb-1">Server URL</label>
      <input type="text" id="plex-url" name="url" placeholder="http://plex:32400"
             class="w-full bg-surface-elevated border border-border rounded px-4 py-2 text-text-primary placeholder-text-muted focus:border-border-focus focus:ring-1 focus:ring-border-focus focus:outline-none">
    </div>
    <div>
      <label for="plex-token" class="block text-[13px] text-text-secondary mb-1">Access Token</label>
      <input type="password" id="plex-token" name="token" placeholder="Your Plex authentication token"
             class="w-full bg-surface-elevated border border-border rounded px-4 py-2 text-text-primary placeholder-text-muted focus:border-border-focus focus:ring-1 focus:ring-border-focus focus:outline-none">
    </div>
    <div class="flex items-center gap-3">
      <button type="submit"
              class="bg-accent hover:bg-accent-hover text-surface-primary font-semibold px-6 py-2 rounded-lg transition-colors min-h-[44px]">
        Test Connection
      </button>
      {% include "partials/spinner.html" %}
    </div>
  </div>
</form>
<div id="plex-result"></div>
